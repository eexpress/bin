[theme_info]
name=eexpss 修改版本
description=A soft dark theme
# incremented automatically, do not change manually
version=1
author=eexpss(at)gmail
url=
# list of each compatible Geany release version
compat=1.22;1.23;1.23.1;1.24

[named_colors]
fg=#b6c3cf
bg=#3b3b3b

caret_grey=#c6c6c6
margin_fg_grey=#989898
fold_fg_grey=#888
whitespace_grey=#505050
calltip_fg_grey=#555
calltip_bg_grey=#ddd
fold_bg_grey=#4c4c4c
current_line_grey=#606060
margin_bg_grey=#424446

type_violet=#a88ab6
keyword_blue=#9CA7FF
number_blue=#80CCFF
selection_blue=#2f5692
brace_bg_green=#4d6360
diff_added_green=#558266
docstring_green=#73a46a
string_green=#b2ca78
alert_yellow=#ffef4c
tag_yellow=#edc881
keyword_orange=#d58a4a
error_red=#c85550
diff_removed_red=#a0665b

[named_styles]

default=fg;bg;false;false
error=error_red;;;true

# Editor styles
#-------------------------------------------------------------------------------

selection=;selection_blue;;true
current_line=;current_line_grey;true
#brace_good=alert_yellow;brace_bg_green;true
brace_good=#fff;#50aa15;true;false
brace_bad=error_red;current_line_grey;true
margin_line_number=margin_fg_grey;margin_bg_grey
margin_folding=fold_fg_grey;fold_bg_grey
fold_symbol_highlight=fold_bg_grey
indent_guide=whitespace_grey
caret=caret_grey
marker_line=margin_bg_grey;alert_yellow
marker_search=;alert_yellow
marker_mark=margin_bg_grey;alert_yellow
call_tips=calltip_fg_grey;calltip_bg_grey;true;true
white_space=whitespace_grey;;true

# Programming languages
#-------------------------------------------------------------------------------

#多行注释
#很浅的灰色
comment=#616161;;;true
comment_doc=docstring_green
#单行注释
comment_line=comment
comment_line_doc=comment_doc
comment_doc_keyword=comment_doc,bold
comment_doc_keyword_error=comment_doc,italic

number=number_blue
number_1=number
number_2=number_1

type=type_violet
#类名
#class=#00A02B;;true
class=#CC4655;;true
function=tag_yellow
parameter=function

#关键词
keyword=keyword_blue;;true
keyword_1=keyword
keyword_2=keyword_orange;;true
keyword_3=keyword_1
keyword_4=keyword_1

#变量
#identifier=string_green;;true;
#identifier=string_green
identifier=default
identifier_1=identifier
identifier_2=identifier;#300000
identifier_3=identifier;;true
identifier_4=identifier;;;true

#字符串
string=string_green;;true;true
string_1=string
string_2=string_1
string_3=default
string_4=default
string_eol=string_1,italic
character=string_1
backticks=string_2
here_doc=string_2

scalar=string_2
label=default,bold
preprocessor=tag_yellow
regex=number_1
#运算符
operator=keyword_orange;;true;
#operator=#93B247;;true;
#operator=string_green;;true;

decorator=tag_yellow
other=default

# Markup-type languages
#-------------------------------------------------------------------------------

tag=tag_yellow
tag_unknown=tag
tag_end=tag
attribute=keyword_orange
attribute_unknown=attribute
value=string_green
entity=number_blue

# Diff
#-------------------------------------------------------------------------------

line_added=diff_added_green
line_removed=diff_removed_red
line_changed=preprocessor
